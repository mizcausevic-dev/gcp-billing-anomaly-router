name: Deploy to gcp.kineticgain.com

# Node/Vite/React -> Hostinger SSH deploy at /gcp/

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-gcp-billing-anomaly-router
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build + SSH deploy to gcp.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      TARGET_NAME: gcp
      LIVE_URL: https://gcp.kineticgain.com/

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: |
          if npm run | grep -q "^  prerender$"; then
            npm run prerender
          else
            npm run build
          fi

      - name: Verify build output
        run: |
          if [ -d "site" ]; then DEPLOY_DIR="site"
          elif [ -d "dist" ]; then DEPLOY_DIR="dist"
          elif [ -d "build" ]; then DEPLOY_DIR="build"
          else
            echo "FAIL: no site/, dist/, or build/ produced"
            exit 1
          fi
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV
          test -f "$DEPLOY_DIR/index.html" || (echo "FAIL: $DEPLOY_DIR/index.html missing" && exit 1)

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SSH_HOST}"
          test -n "${SSH_PORT}"
          test -n "${SSH_USER}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts

      - name: Upload build to staging
        shell: bash
        run: |
          set -euo pipefail
          target_parent="/home/${SSH_USER}/domains/kineticgain.com/public_html"
          release_dir="${target_parent}/.${TARGET_NAME}-release-${GITHUB_SHA}"
          ssh -i ~/.ssh/hostinger_deploy_key -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p '${release_dir}'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hostinger_deploy_key -p ${SSH_PORT}" \
            "${DEPLOY_DIR}/" "${SSH_USER}@${SSH_HOST}:${release_dir}/"

      - name: Validate staging and swap live folder
        shell: bash
        run: |
          set -euo pipefail
          target_parent="/home/${SSH_USER}/domains/kineticgain.com/public_html"
          release_dir="${target_parent}/.${TARGET_NAME}-release-${GITHUB_SHA}"
          target_dir="${target_parent}/${TARGET_NAME}"
          backup_dir="${target_parent}/.${TARGET_NAME}-backup-${GITHUB_SHA}"
          ssh -i ~/.ssh/hostinger_deploy_key -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "
            set -e
            test -f '${release_dir}/index.html'
            grep -q 'GCP billing anomalies' '${release_dir}/index.html'
            if [ -d '${target_dir}' ]; then
              mv '${target_dir}' '${backup_dir}'
            fi
            if mv '${release_dir}' '${target_dir}'; then
              echo 'GCP deploy swap complete.'
            else
              if [ -d '${backup_dir}' ]; then
                mv '${backup_dir}' '${target_dir}'
              fi
              exit 1
            fi
          "

      - name: Verify live GCP surface
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-delay 3 "${LIVE_URL}" \
            | grep -q 'GCP billing anomalies'
